<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIIT Tabata Timer — 20 Min Lo-Fi</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=Space+Grotesk:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --work: #f97316;
    --rest: #38bdf8;
    --text: #e2e8f0;
    --muted: #475569;
    --accent: #f97316;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.4;
  }

  /* Ambient glow */
  .glow {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    transition: background 1.5s ease;
  }
  .glow-1 {
    width: 600px; height: 600px;
    top: -200px; left: -200px;
    background: rgba(249,115,22,0.06);
  }
  .glow-2 {
    width: 400px; height: 400px;
    bottom: -100px; right: -100px;
    background: rgba(56,189,248,0.05);
  }

  .container {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 560px;
    padding: 2rem 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
  }

  /* Header */
  .header {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.25em;
    color: var(--muted);
  }

  .total-time {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* Progress bar (top) */
  .overall-progress {
    width: 100%;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .overall-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--work), var(--rest));
    width: 0%;
    transition: width 1s linear;
  }

  /* Phase label */
  .phase-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 4.5rem;
    letter-spacing: 0.15em;
    line-height: 1;
    transition: color 0.6s ease;
    text-align: center;
  }
  .phase-label.work { color: var(--work); }
  .phase-label.rest { color: var(--rest); }

  /* Main timer circle */
  .timer-wrap {
    position: relative;
    width: 260px;
    height: 260px;
  }

  .timer-svg {
    position: absolute;
    inset: 0;
    transform: rotate(-90deg);
  }

  .timer-track {
    fill: none;
    stroke: var(--border);
    stroke-width: 3;
  }

  .timer-progress {
    fill: none;
    stroke-width: 3;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.6s ease;
  }

  .timer-inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.25rem;
  }

  .timer-count {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 6rem;
    line-height: 1;
    letter-spacing: 0.05em;
    transition: color 0.6s ease;
  }

  .timer-unit {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--muted);
  }

  /* Round info */
  .round-info {
    display: flex;
    gap: 2.5rem;
    align-items: center;
  }

  .info-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.3rem;
  }

  .info-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.1em;
    line-height: 1;
  }

  .info-label {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .sep {
    width: 1px;
    height: 40px;
    background: var(--border);
  }

  /* Exercise name */
  .exercise-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-align: center;
    min-height: 2rem;
    transition: color 0.4s ease;
  }

  /* Next exercise */
  .next-exercise {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-align: center;
    opacity: 0.6;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 1rem;
    align-items: center;
  }

  .btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    padding: 0.6rem 1.4rem;
    cursor: pointer;
    transition: all 0.2s ease;
    text-transform: uppercase;
  }

  .btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn-main {
    background: var(--work);
    border-color: var(--work);
    color: #000;
    font-size: 0.75rem;
    padding: 0.75rem 2.5rem;
    font-weight: 500;
  }

  .btn-main:hover {
    background: #ea6c0a;
    border-color: #ea6c0a;
    color: #000;
  }

  .btn-main.resting {
    background: var(--rest);
    border-color: var(--rest);
  }
  .btn-main.resting:hover {
    background: #29a8d8;
    border-color: #29a8d8;
  }

  /* Lo-fi tag */
  .lofi-tag {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 0.5rem;
    opacity: 0.5;
  }

  .lofi-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--rest);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  /* Set timeline */
  .timeline {
    display: flex;
    gap: 3px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 400px;
  }

  .timeline-dot {
    width: 8px; height: 8px;
    border-radius: 2px;
    background: var(--border);
    transition: background 0.4s ease;
  }

  .timeline-dot.done-work { background: var(--work); opacity: 0.6; }
  .timeline-dot.done-rest { background: var(--rest); opacity: 0.4; }
  .timeline-dot.active { background: var(--work); box-shadow: 0 0 6px var(--work); }
  .timeline-dot.active-rest { background: var(--rest); box-shadow: 0 0 6px var(--rest); }

  /* Finish screen */
  .finish-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
    text-align: center;
  }

  .finish-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 5rem;
    letter-spacing: 0.15em;
    color: var(--work);
    line-height: 1;
  }

  .finish-sub {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--muted);
  }

  .flash {
    animation: flash 0.3s ease;
  }

  @keyframes flash {
    0% { opacity: 1; }
    50% { opacity: 0.3; }
    100% { opacity: 1; }
  }
</style>
</head>
<body>

<div class="glow glow-1" id="glow1"></div>
<div class="glow glow-2" id="glow2"></div>

<div class="container" id="mainScreen">
  <div class="header">
    <div class="title">TABATA × LO-FI</div>
    <div class="total-time" id="totalDisplay">20:00</div>
  </div>

  <div class="overall-progress">
    <div class="overall-fill" id="overallFill"></div>
  </div>

  <div class="phase-label work" id="phaseLabel">WORK</div>

  <div class="timer-wrap">
    <svg class="timer-svg" viewBox="0 0 260 260">
      <circle class="timer-track" cx="130" cy="130" r="120"/>
      <circle class="timer-progress" id="timerCircle" cx="130" cy="130" r="120"
        stroke="#f97316"
        stroke-dasharray="753.98"
        stroke-dashoffset="0"/>
    </svg>
    <div class="timer-inner">
      <div class="timer-count" id="timerCount" style="color: var(--work)">20</div>
      <div class="timer-unit">seconds</div>
    </div>
  </div>

  <div class="exercise-name" id="exerciseName">BURPEES</div>
  <div class="next-exercise" id="nextExercise">NEXT → REST 10s</div>

  <div class="round-info">
    <div class="info-block">
      <div class="info-val" id="roundDisplay">1</div>
      <div class="info-label">Round</div>
    </div>
    <div class="sep"></div>
    <div class="info-block">
      <div class="info-val">8</div>
      <div class="info-label">Total</div>
    </div>
    <div class="sep"></div>
    <div class="info-block">
      <div class="info-val" id="setDisplay">1</div>
      <div class="info-label">Set</div>
    </div>
  </div>

  <div class="timeline" id="timeline"></div>

  <div class="controls">
    <button class="btn" id="resetBtn" onclick="resetTimer()">RESET</button>
    <button class="btn btn-main" id="startBtn" onclick="toggleTimer()">START</button>
    <button class="btn" onclick="skipPhase()">SKIP</button>
  </div>

  <div class="lofi-tag">
    <div class="lofi-dot"></div>
    LO-FI MODE — ADD YOUR MUSIC
  </div>
</div>

<div class="finish-screen" id="finishScreen">
  <div class="finish-title">DONE.</div>
  <div class="finish-sub">20 MINUTES — 4 SETS — 32 ROUNDS</div>
  <div class="finish-sub" style="margin-top:0.5rem; color: var(--work)">GREAT WORK</div>
  <button class="btn btn-main" onclick="resetTimer(); document.getElementById('finishScreen').style.display='none'; document.getElementById('mainScreen').style.display='flex';" style="margin-top:1rem">RESTART</button>
</div>

<script>
const EXERCISES = [
  "BURPEES", "JUMP SQUATS", "PUSH-UPS", "HIGH KNEES",
  "MOUNTAIN CLIMBERS", "SQUAT JUMPS", "PLANK JACKS", "STAR JUMPS"
];

const WORK_TIME = 20;
const REST_TIME = 10;
const ROUNDS_PER_SET = 8;
const TOTAL_SETS = 4;
const TOTAL_ROUNDS = ROUNDS_PER_SET * TOTAL_SETS; // 32

let currentRound = 0; // 0-based
let isWork = true;
let timeLeft = WORK_TIME;
let running = false;
let interval = null;
let totalSeconds = (WORK_TIME + REST_TIME) * TOTAL_ROUNDS;
let elapsedSeconds = 0;

const circumference = 2 * Math.PI * 120; // 753.98

function buildTimeline() {
  const tl = document.getElementById('timeline');
  tl.innerHTML = '';
  for (let i = 0; i < TOTAL_ROUNDS; i++) {
    const d = document.createElement('div');
    d.className = 'timeline-dot';
    d.id = `dot-${i}`;
    tl.appendChild(d);
  }
}

function updateTimeline() {
  for (let i = 0; i < TOTAL_ROUNDS; i++) {
    const d = document.getElementById(`dot-${i}`);
    if (i < currentRound) {
      d.className = 'timeline-dot done-work';
    } else if (i === currentRound) {
      d.className = isWork ? 'timeline-dot active' : 'timeline-dot active-rest';
    } else {
      d.className = 'timeline-dot';
    }
  }
}

function updateDisplay() {
  const phase = document.getElementById('phaseLabel');
  const count = document.getElementById('timerCount');
  const circle = document.getElementById('timerCircle');
  const exerciseName = document.getElementById('exerciseName');
  const nextEx = document.getElementById('nextExercise');
  const roundDisplay = document.getElementById('roundDisplay');
  const setDisplay = document.getElementById('setDisplay');
  const startBtn = document.getElementById('startBtn');
  const glow1 = document.getElementById('glow1');

  const duration = isWork ? WORK_TIME : REST_TIME;
  const progress = timeLeft / duration;
  const offset = circumference * (1 - progress);

  circle.style.strokeDashoffset = offset;

  if (isWork) {
    phase.textContent = 'WORK';
    phase.className = 'phase-label work';
    count.style.color = 'var(--work)';
    circle.style.stroke = '#f97316';
    exerciseName.style.color = 'var(--text)';
    exerciseName.textContent = EXERCISES[currentRound % EXERCISES.length];
    nextEx.textContent = `NEXT → REST 10s`;
    startBtn.className = 'btn btn-main';
    glow1.style.background = 'rgba(249,115,22,0.08)';
  } else {
    phase.textContent = 'REST';
    phase.className = 'phase-label rest';
    count.style.color = 'var(--rest)';
    circle.style.stroke = '#38bdf8';
    exerciseName.style.color = 'var(--muted)';
    const nextExercise = EXERCISES[(currentRound + 1) % EXERCISES.length];
    exerciseName.textContent = 'BREATHE';
    nextEx.textContent = `NEXT → ${nextExercise}`;
    startBtn.className = 'btn btn-main resting';
    glow1.style.background = 'rgba(56,189,248,0.06)';
  }

  count.textContent = timeLeft;
  roundDisplay.textContent = (currentRound % ROUNDS_PER_SET) + 1;
  setDisplay.textContent = Math.floor(currentRound / ROUNDS_PER_SET) + 1;

  // Overall progress
  const overallProgress = (elapsedSeconds / totalSeconds) * 100;
  document.getElementById('overallFill').style.width = overallProgress + '%';

  // Total time remaining
  const totalLeft = totalSeconds - elapsedSeconds;
  const mins = Math.floor(totalLeft / 60).toString().padStart(2, '0');
  const secs = (totalLeft % 60).toString().padStart(2, '0');
  document.getElementById('totalDisplay').textContent = `${mins}:${secs}`;

  updateTimeline();
}

function tick() {
  if (timeLeft > 0) {
    timeLeft--;
    elapsedSeconds++;
    updateDisplay();
  } else {
    // Switch phase
    if (isWork) {
      isWork = false;
      timeLeft = REST_TIME;
      flashScreen();
    } else {
      currentRound++;
      if (currentRound >= TOTAL_ROUNDS) {
        clearInterval(interval);
        running = false;
        showFinish();
        return;
      }
      isWork = true;
      timeLeft = WORK_TIME;
      flashScreen();
    }
    updateDisplay();
  }
}

function flashScreen() {
  document.body.classList.add('flash');
  setTimeout(() => document.body.classList.remove('flash'), 300);
}

function toggleTimer() {
  const btn = document.getElementById('startBtn');
  if (running) {
    clearInterval(interval);
    running = false;
    btn.textContent = 'RESUME';
  } else {
    interval = setInterval(tick, 1000);
    running = true;
    btn.textContent = 'PAUSE';
  }
}

function resetTimer() {
  clearInterval(interval);
  running = false;
  currentRound = 0;
  isWork = true;
  timeLeft = WORK_TIME;
  elapsedSeconds = 0;
  document.getElementById('startBtn').textContent = 'START';
  document.getElementById('startBtn').className = 'btn btn-main';
  updateDisplay();
}

function skipPhase() {
  if (isWork) {
    isWork = false;
    timeLeft = REST_TIME;
  } else {
    currentRound++;
    if (currentRound >= TOTAL_ROUNDS) {
      clearInterval(interval);
      running = false;
      showFinish();
      return;
    }
    isWork = true;
    timeLeft = WORK_TIME;
  }
  updateDisplay();
}

function showFinish() {
  document.getElementById('mainScreen').style.display = 'none';
  document.getElementById('finishScreen').style.display = 'flex';
}

// Init
buildTimeline();
updateDisplay();

// OBSDNFIT Sound System
let _audioCtx = null;
function _getCtx() { if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return _audioCtx; }
function _osc(freq, start, dur, type='sine', vol=0.4, ramp=false) { const c = _getCtx(); const o = c.createOscillator(); const g = c.createGain(); o.connect(g); g.connect(c.destination); o.type = type; o.frequency.setValueAtTime(freq, c.currentTime + start); if (ramp) o.frequency.linearRampToValueAtTime(ramp, c.currentTime + start + dur); g.gain.setValueAtTime(0, c.currentTime + start); g.gain.linearRampToValueAtTime(vol, c.currentTime + start + 0.005); g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + start + dur); o.start(c.currentTime + start); o.stop(c.currentTime + start + dur + 0.05); }
function _noise(start, dur, vol=0.1) { const c = _getCtx(); const buf = c.createBuffer(1, c.sampleRate * dur, c.sampleRate); const data = buf.getChannelData(0); for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1; const src = c.createBufferSource(); const g = c.createGain(); const filter = c.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = 800; src.buffer = buf; src.connect(filter); filter.connect(g); g.connect(c.destination); g.gain.setValueAtTime(vol, c.currentTime + start); g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + start + dur); src.start(c.currentTime + start); }
function soundWork() { _noise(0,0.08,0.3); _osc(200,0,0.15,'square',0.3); _osc(800,0,0.1,'sine',0.4); }
function soundRest() { _osc(523,0,0.8,'sine',0.3); _osc(659,0.05,0.7,'sine',0.2); _osc(784,0.1,0.6,'sine',0.15); }
function soundWarning() { for(let i=0;i<3;i++){_osc(1000,i*0.3,0.05,'square',0.2); _noise(i*0.3,0.04,0.15);} }
function soundFinish() { _osc(523,0,0.2,'sine',0.4); _osc(659,0.2,0.2,'sine',0.4); _osc(784,0.4,0.2,'sine',0.4); _osc(1047,0.6,0.6,'sine',0.5); }
function soundBell() { _osc(400,0,0.05,'square',0.5); _osc(350,0,1.8,'sine',0.45); _osc(700,0.01,1.2,'sine',0.2); _osc(175,0.02,2.0,'sine',0.3); _noise(0,0.08,0.3); }
</script>
</body>
</html>
