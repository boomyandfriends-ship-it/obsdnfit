<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrossFit EMOM 20 Min | No Music — OBSDNFIT</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09090e; --border: #1c1c28;
    --work: #dc2626; --accent: #f59e0b;
    --rest: #22c55e; --text: #e2e8f0; --muted: #475569;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; overflow:hidden; position:relative; }
  body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events:none; z-index:100; opacity:0.4; }
  .glow { position:fixed; border-radius:50%; filter:blur(140px); pointer-events:none; transition:background 1.5s ease; }
  .glow-1 { width:700px; height:700px; top:-250px; left:-250px; background:rgba(220,38,38,0.06); }
  .glow-2 { width:500px; height:500px; bottom:-150px; right:-150px; background:rgba(34,197,94,0.04); }

  .countdown-overlay { position:fixed; inset:0; z-index:200; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1rem; }
  .cd-label { font-family:'Bebas Neue',sans-serif; font-size:1.2rem; letter-spacing:0.4em; color:var(--muted); }
  .cd-number { font-family:'Bebas Neue',sans-serif; font-size:12rem; line-height:1; color:var(--work); animation:cdpulse 1s ease-in-out; }
  .cd-sub { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; letter-spacing:0.25em; color:var(--muted); }
  @keyframes cdpulse { 0%{transform:scale(1.3);opacity:0;} 100%{transform:scale(1);opacity:1;} }

  .motivator { position:fixed; top:8%; left:50%; transform:translateX(-50%); font-family:'Bebas Neue',sans-serif; font-size:2.5rem; letter-spacing:0.35em; pointer-events:none; z-index:150; opacity:0; transition:opacity 0.3s ease; white-space:nowrap; }

  .container { position:relative; z-index:10; width:100%; max-width:580px; padding:1.5rem; display:flex; flex-direction:column; align-items:center; gap:1.1rem; }

  .header { width:100%; display:flex; justify-content:space-between; align-items:center; }
  .title { font-family:'Bebas Neue',sans-serif; font-size:1.1rem; letter-spacing:0.25em; color:var(--muted); }
  .total-time { font-size:0.75rem; color:var(--muted); letter-spacing:0.1em; }

  .overall-progress { width:100%; height:2px; background:var(--border); border-radius:2px; overflow:hidden; }
  .overall-fill { height:100%; background:linear-gradient(90deg,var(--work),var(--accent)); width:0%; transition:width 1s linear; }

  .wod-badge { font-family:'Bebas Neue',sans-serif; font-size:3.5rem; letter-spacing:0.3em; color:var(--work); line-height:1; }

  /* Phase indicator */
  .phase-row { display:flex; gap:12px; align-items:center; }
  .phase-chip { font-size:0.6rem; letter-spacing:0.2em; padding:4px 14px; border:1px solid; transition:all 0.4s ease; font-family:'Bebas Neue',sans-serif; font-size:0.8rem; }
  .phase-chip.work-chip { color:var(--work); border-color:rgba(220,38,38,0.4); background:rgba(220,38,38,0.08); }
  .phase-chip.rest-chip { color:var(--rest); border-color:rgba(34,197,94,0.2); }

  /* Config */
  .config-section { width:100%; display:flex; flex-direction:column; gap:8px; }
  .config-row { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .config-lbl { font-size:0.58rem; letter-spacing:0.2em; color:var(--muted); min-width:80px; }
  .config-btn { font-family:'DM Mono',monospace; font-size:0.6rem; letter-spacing:0.12em; color:var(--muted); border:1px solid var(--border); padding:4px 10px; cursor:pointer; background:none; transition:all 0.2s ease; text-transform:uppercase; }
  .config-btn:hover { border-color:var(--work); color:var(--work); }
  .config-btn.active { border-color:var(--work); color:var(--work); background:rgba(220,38,38,0.08); }

  /* Main timer */
  .timer-wrap { position:relative; width:250px; height:250px; }
  .timer-svg { position:absolute; inset:0; transform:rotate(-90deg); }
  .timer-track { fill:none; stroke:var(--border); stroke-width:3; }
  .timer-progress { fill:none; stroke-width:3; stroke-linecap:round; transition:stroke-dashoffset 1s linear, stroke 0.4s ease; }
  .timer-inner { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0.2rem; }
  .timer-count { font-family:'Bebas Neue',sans-serif; font-size:5.5rem; line-height:1; letter-spacing:0.05em; transition:color 0.4s ease; }
  .timer-unit { font-size:0.6rem; letter-spacing:0.2em; color:var(--muted); }

  /* Current movement */
  .movement-display { display:flex; flex-direction:column; align-items:center; gap:4px; }
  .mvt-name-big { font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:0.15em; transition:color 0.4s ease; text-align:center; }
  .mvt-reps-big { font-size:0.65rem; letter-spacing:0.2em; color:var(--muted); }
  .mvt-next { font-size:0.58rem; letter-spacing:0.15em; color:var(--muted); opacity:0.6; }

  /* Minute grid */
  .minute-grid { width:100%; display:flex; flex-direction:column; gap:5px; }
  .grid-label { display:flex; justify-content:space-between; font-size:0.58rem; letter-spacing:0.15em; color:var(--muted); }
  .grid-cells { display:flex; gap:3px; flex-wrap:wrap; }
  .grid-cell { flex:1; min-width:14px; height:6px; border-radius:2px; background:var(--border); transition:all 0.4s ease; }
  .grid-cell.done { background:var(--work); opacity:0.5; }
  .grid-cell.active { background:var(--work); box-shadow:0 0 5px var(--work); }
  .grid-cell.rest { background:var(--rest); opacity:0.4; }

  .stats-row { display:flex; gap:2rem; align-items:center; }
  .stat-block { display:flex; flex-direction:column; align-items:center; gap:0.3rem; }
  .stat-val { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; letter-spacing:0.1em; line-height:1; }
  .stat-label { font-size:0.58rem; letter-spacing:0.2em; color:var(--muted); text-transform:uppercase; }
  .sep { width:1px; height:36px; background:var(--border); }

  .controls { display:flex; gap:1rem; align-items:center; }
  .btn { background:none; border:1px solid var(--border); color:var(--text); font-family:'DM Mono',monospace; font-size:0.7rem; letter-spacing:0.15em; padding:0.6rem 1.4rem; cursor:pointer; transition:all 0.2s ease; text-transform:uppercase; }
  .btn:hover { border-color:var(--work); color:var(--work); }
  .btn-main { background:var(--work); border-color:var(--work); color:#fff; font-size:0.75rem; padding:0.75rem 2.5rem; }
  .btn-main:hover { background:#b91c1c; }
  .btn-main.resting { background:var(--rest); border-color:var(--rest); color:#000; }

  .lofi-tag { font-size:0.6rem; letter-spacing:0.2em; color:var(--muted); display:flex; align-items:center; gap:0.5rem; opacity:0.5; }
  .nomusic-dot { width:5px; height:5px; border-radius:50%; background:var(--accent); animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:0.4;transform:scale(1);} 50%{opacity:1;transform:scale(1.3);} }

  .finish-screen { display:none; flex-direction:column; align-items:center; gap:1.5rem; text-align:center; }
  .finish-title { font-family:'Bebas Neue',sans-serif; font-size:5rem; letter-spacing:0.15em; color:var(--work); line-height:1; }
  .finish-sub { font-size:0.7rem; letter-spacing:0.2em; color:var(--muted); }

  .flash { animation:flash 0.3s ease; }
  @keyframes flash { 0%{opacity:1;} 50%{opacity:0.15;} 100%{opacity:1;} }
</style>
</head>
<body>

<div class="glow glow-1" id="glow1"></div>
<div class="glow glow-2"></div>

<div class="countdown-overlay" id="countdownOverlay" style="display:none;">
  <div class="cd-label">EMOM</div>
  <div class="cd-number" id="cdNumber">3</div>
  <div class="cd-sub" id="cdSub">EVERY MINUTE ON THE MINUTE</div>
</div>

<div class="motivator" id="motivator"></div>

<div class="container" id="mainScreen">
  <div class="header">
    <div class="title">OBSDNFIT × CROSSFIT</div>
    <div class="total-time" id="totalDisplay">20:00</div>
  </div>

  <div class="overall-progress"><div class="overall-fill" id="overallFill"></div></div>

  <div class="wod-badge">EMOM</div>

  <!-- Config -->
  <div class="config-section" id="configSection">
    <div class="config-row">
      <span class="config-lbl">DURATION:</span>
      <button class="config-btn" onclick="setDuration(10)">10 MIN</button>
      <button class="config-btn" onclick="setDuration(15)">15 MIN</button>
      <button class="config-btn active" onclick="setDuration(20)">20 MIN</button>
      <button class="config-btn" onclick="setDuration(30)">30 MIN</button>
    </div>
    <div class="config-row">
      <span class="config-lbl">MOVEMENTS:</span>
      <button class="config-btn active" onclick="setMovements(1)">1 MVT</button>
      <button class="config-btn" onclick="setMovements(2)">2 MVT</button>
      <button class="config-btn" onclick="setMovements(3)">3 MVT</button>
    </div>
  </div>

  <!-- Phase chips -->
  <div class="phase-row">
    <div class="phase-chip work-chip" id="workChip">WORK</div>
    <div class="phase-chip rest-chip" id="restChip">REST</div>
  </div>

  <!-- Timer -->
  <div class="timer-wrap">
    <svg class="timer-svg" viewBox="0 0 250 250">
      <circle class="timer-track" cx="125" cy="125" r="115"/>
      <circle class="timer-progress" id="timerCircle" cx="125" cy="125" r="115"
        stroke="#dc2626" stroke-dasharray="722.57" stroke-dashoffset="0"/>
    </svg>
    <div class="timer-inner">
      <div class="timer-count" id="timerCount" style="color:var(--work)">60</div>
      <div class="timer-unit" id="timerUnit">SECONDS</div>
    </div>
  </div>

  <!-- Current movement -->
  <div class="movement-display">
    <div class="mvt-name-big" id="mvtName" style="color:var(--work)">BURPEES</div>
    <div class="mvt-reps-big" id="mvtReps">10 REPS — MINUTE 1</div>
    <div class="mvt-next" id="mvtNext">REST WHEN DONE</div>
  </div>

  <!-- Minute grid -->
  <div class="minute-grid">
    <div class="grid-label">
      <span>MINUTES</span>
      <span id="gridLabel">1 / 20</span>
    </div>
    <div class="grid-cells" id="gridCells"></div>
  </div>

  <div class="stats-row">
    <div class="stat-block">
      <div class="stat-val" id="minuteDisplay">1</div>
      <div class="stat-label">Minute</div>
    </div>
    <div class="sep"></div>
    <div class="stat-block">
      <div class="stat-val" id="totalMinDisplay">20</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="sep"></div>
    <div class="stat-block">
      <div class="stat-val" id="elapsedDisplay">0:00</div>
      <div class="stat-label">Elapsed</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" onclick="resetTimer()">RESET</button>
    <button class="btn btn-main" id="startBtn" onclick="startWithCountdown()">START</button>
    <button class="btn" onclick="skipMinute()">SKIP</button>
  </div>

  <div class="lofi-tag">
    <div class="nomusic-dot"></div>
    NO MUSIC VERSION — ADD YOUR OWN
  </div>
</div>

<div class="finish-screen" id="finishScreen">
  <div class="finish-title">DONE.</div>
  <div class="finish-sub" id="finishSub">20 MIN EMOM COMPLETE</div>
  <div class="finish-sub" style="margin-top:0.5rem;color:var(--work)">WELL DONE.</div>
  <button class="btn btn-main" onclick="resetTimer();document.getElementById('finishScreen').style.display='none';document.getElementById('mainScreen').style.display='flex';" style="margin-top:1rem">RESTART</button>
</div>

<script>
const MOVEMENTS_BANK = {
  1: [{ n:'BURPEES', r:10 }],
  2: [{ n:'PULL-UPS', r:10 }, { n:'PUSH-UPS', r:20 }],
  3: [{ n:'PULL-UPS', r:5 }, { n:'PUSH-UPS', r:10 }, { n:'AIR SQUATS', r:15 }],
};

let DURATION_MINS = 20;
let TOTAL_SECONDS = 20 * 60;
let NUM_MOVEMENTS = 1;
let currentMinute = 0; // 0-based
let timeLeft = 60;
let running = false;
let interval = null;
let elapsedSeconds = 0;
const circumference = 722.57;

function fmt(s) {
  const m = Math.floor(s/60); const sec = (s%60).toString().padStart(2,'0');
  return `${m}:${sec}`;
}

function setDuration(mins) {
  if (running) return;
  DURATION_MINS = mins; TOTAL_SECONDS = mins * 60;
  document.querySelectorAll('.config-btn').forEach(b => {
    if (b.textContent === `${mins} MIN`) b.classList.add('active');
    else if (b.textContent.includes('MIN')) b.classList.remove('active');
  });
  document.getElementById('totalMinDisplay').textContent = mins;
  resetTimer();
}

function setMovements(n) {
  if (running) return;
  NUM_MOVEMENTS = n;
  document.querySelectorAll('.config-btn').forEach(b => {
    if (b.textContent === `${n} MVT`) b.classList.add('active');
    else if (b.textContent.includes('MVT')) b.classList.remove('active');
  });
  resetTimer();
}

function buildGrid() {
  const cells = document.getElementById('gridCells');
  cells.innerHTML = '';
  for (let i = 0; i < DURATION_MINS; i++) {
    const c = document.createElement('div');
    c.className = 'grid-cell'; c.id = `gcell-${i}`;
    cells.appendChild(c);
  }
}

function getCurrentMovement() {
  const movements = MOVEMENTS_BANK[NUM_MOVEMENTS];
  return movements[currentMinute % movements.length];
}

function getNextMovement() {
  const movements = MOVEMENTS_BANK[NUM_MOVEMENTS];
  return movements[(currentMinute + 1) % movements.length];
}

function updateUI() {
  const progress = timeLeft / 60;
  const offset = circumference * (1 - progress);
  document.getElementById('timerCircle').style.strokeDashoffset = offset;
  document.getElementById('timerCount').textContent = timeLeft;

  const isWorkPhase = timeLeft > 0;
  const mv = getCurrentMovement();
  const nextMv = getNextMovement();

  // Color based on time remaining in minute
  const isResting = timeLeft <= 20 && timeLeft > 0;
  if (isResting) {
    document.getElementById('timerCount').style.color = 'var(--rest)';
    document.getElementById('timerCircle').style.stroke = '#22c55e';
    document.getElementById('mvtName').style.color = 'var(--rest)';
    document.getElementById('mvtName').textContent = 'REST';
    document.getElementById('mvtReps').textContent = `${timeLeft}s REST — MINUTE ${currentMinute + 1}`;
    document.getElementById('mvtNext').textContent = `NEXT → ${nextMv.n} × ${nextMv.r}`;
    document.getElementById('startBtn').className = 'btn btn-main resting';
    document.getElementById('glow1').style.background = 'rgba(34,197,94,0.06)';
    document.getElementById('workChip').className = 'phase-chip rest-chip';
    document.getElementById('restChip').className = 'phase-chip rest-chip';
  } else {
    document.getElementById('timerCount').style.color = 'var(--work)';
    document.getElementById('timerCircle').style.stroke = '#dc2626';
    document.getElementById('mvtName').style.color = 'var(--work)';
    document.getElementById('mvtName').textContent = mv.n;
    document.getElementById('mvtReps').textContent = `${mv.r} REPS — MINUTE ${currentMinute + 1}`;
    document.getElementById('mvtNext').textContent = `REST WHEN DONE · NEXT → ${nextMv.n}`;
    document.getElementById('startBtn').className = 'btn btn-main';
    document.getElementById('glow1').style.background = 'rgba(220,38,38,0.07)';
    document.getElementById('workChip').className = 'phase-chip work-chip';
    document.getElementById('restChip').className = 'phase-chip rest-chip';
  }

  document.getElementById('minuteDisplay').textContent = currentMinute + 1;
  document.getElementById('gridLabel').textContent = `${currentMinute + 1} / ${DURATION_MINS}`;

  const pct = (elapsedSeconds / TOTAL_SECONDS) * 100;
  document.getElementById('overallFill').style.width = pct + '%';
  document.getElementById('totalDisplay').textContent = fmt(Math.max(0, TOTAL_SECONDS - elapsedSeconds));
  document.getElementById('elapsedDisplay').textContent = fmt(elapsedSeconds);

  for (let i = 0; i < DURATION_MINS; i++) {
    const c = document.getElementById(`gcell-${i}`);
    if (!c) continue;
    if (i < currentMinute) c.className = 'grid-cell done';
    else if (i === currentMinute) c.className = isResting ? 'grid-cell rest' : 'grid-cell active';
    else c.className = 'grid-cell';
  }
}

function showMotivator(text, color) {
  const el = document.getElementById('motivator');
  el.textContent = text; el.style.color = color; el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 1800);
}

function tick() {
  if (timeLeft > 0) {
    timeLeft--; elapsedSeconds++;
    if (timeLeft === 20) showMotivator('REST!', '#22c55e');
    if (timeLeft === 5) showMotivator('5...', '#f59e0b');
    updateUI();
  } else {
    // Next minute
    currentMinute++;
    if (currentMinute >= DURATION_MINS) {
      clearInterval(interval); running = false;
      document.getElementById('finishSub').textContent = `${DURATION_MINS} MIN EMOM COMPLETE`;
      showMotivator('WELL DONE.', '#dc2626');
      soundFinish();setTimeout(showFinish, 1500); return;
    }
    timeLeft = 60;
    document.body.classList.add('flash');
    setTimeout(() => document.body.classList.remove('flash'), 300);
    showMotivator(getCurrentMovement().n + '!', '#dc2626');
    updateUI();
  }
}

function startWithCountdown() {
  const btn = document.getElementById('startBtn');
  if (running) { clearInterval(interval); running = false; btn.textContent = 'RESUME'; return; }
  if (elapsedSeconds === 0) {
    document.getElementById('configSection').style.display = 'none';
    const ov = document.getElementById('countdownOverlay');
    const cdN = document.getElementById('cdNumber');
    document.getElementById('cdSub').textContent = `${DURATION_MINS} MIN EMOM · ${NUM_MOVEMENTS} MOVEMENT${NUM_MOVEMENTS > 1 ? 'S' : ''}`;
    ov.style.display = 'flex'; let count = 3; cdN.textContent = count;
    const cdI = setInterval(() => {
      count--;
      if (count === 0) {
        clearInterval(cdI); ov.style.display = 'none';
        interval = setInterval(tick, 1000); running = true; btn.textContent = 'PAUSE';
        showMotivator('GO!', '#dc2626');
      } else {
        cdN.textContent = count; cdN.style.animation = 'none';
        cdN.offsetHeight; cdN.style.animation = 'cdpulse 1s ease-in-out';
      }
    }, 1000);
  } else { interval = setInterval(tick, 1000); running = true; btn.textContent = 'PAUSE'; }
}

function resetTimer() {
  clearInterval(interval); running = false;
  currentMinute = 0; timeLeft = 60; elapsedSeconds = 0;
  document.getElementById('startBtn').textContent = 'START';
  document.getElementById('startBtn').className = 'btn btn-main';
  document.getElementById('configSection').style.display = 'flex';
  buildGrid(); updateUI();
}

function skipMinute() {
  currentMinute++;
  if (currentMinute >= DURATION_MINS) { clearInterval(interval); running = false; showFinish(); return; }
  timeLeft = 60; updateUI();
}

function showFinish() {
  document.getElementById('mainScreen').style.display = 'none';
  document.getElementById('finishScreen').style.display = 'flex';
}

buildGrid();
updateUI();

// OBSDNFIT Sound System
let _audioCtx = null;
function _getCtx() { if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return _audioCtx; }
function _osc(freq, start, dur, type='sine', vol=0.4, ramp=false) { const c = _getCtx(); const o = c.createOscillator(); const g = c.createGain(); o.connect(g); g.connect(c.destination); o.type = type; o.frequency.setValueAtTime(freq, c.currentTime + start); if (ramp) o.frequency.linearRampToValueAtTime(ramp, c.currentTime + start + dur); g.gain.setValueAtTime(0, c.currentTime + start); g.gain.linearRampToValueAtTime(vol, c.currentTime + start + 0.005); g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + start + dur); o.start(c.currentTime + start); o.stop(c.currentTime + start + dur + 0.05); }
function _noise(start, dur, vol=0.1) { const c = _getCtx(); const buf = c.createBuffer(1, c.sampleRate * dur, c.sampleRate); const data = buf.getChannelData(0); for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1; const src = c.createBufferSource(); const g = c.createGain(); const filter = c.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = 800; src.buffer = buf; src.connect(filter); filter.connect(g); g.connect(c.destination); g.gain.setValueAtTime(vol, c.currentTime + start); g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + start + dur); src.start(c.currentTime + start); }
function soundWork() { _noise(0,0.08,0.3); _osc(200,0,0.15,'square',0.3); _osc(800,0,0.1,'sine',0.4); }
function soundRest() { _osc(523,0,0.8,'sine',0.3); _osc(659,0.05,0.7,'sine',0.2); _osc(784,0.1,0.6,'sine',0.15); }
function soundWarning() { for(let i=0;i<3;i++){_osc(1000,i*0.3,0.05,'square',0.2); _noise(i*0.3,0.04,0.15);} }
function soundFinish() { _osc(523,0,0.2,'sine',0.4); _osc(659,0.2,0.2,'sine',0.4); _osc(784,0.4,0.2,'sine',0.4); _osc(1047,0.6,0.6,'sine',0.5); }
function soundBell() { _osc(400,0,0.05,'square',0.5); _osc(350,0,1.8,'sine',0.45); _osc(700,0.01,1.2,'sine',0.2); _osc(175,0.02,2.0,'sine',0.3); _noise(0,0.08,0.3); }
</script>
</body>
</html>
